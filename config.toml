[theme]
base = "dark"
primaryColor          = "#f0c040"
backgroundColor       = "#05060a"
secondaryBackgroundColor = "#0e1117"
textColor             = "#f1f5f9"
font                  = "sans serif"

[server]
maxUploadSize  = 400
enableCORS     = false
headless       = true
enableXsrfProtection = true

[runner]
magicEnabled = false

[browser]
gatherUsageStats = false
